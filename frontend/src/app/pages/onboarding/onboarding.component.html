<div class="onboarding" [class.animating]="animating()">
  <!-- Progress bar -->
  <div class="progress-bar">
    <div class="progress-fill" [style.width.%]="progress"></div>
  </div>

  <!-- Skip button -->
  <button class="skip-btn" (click)="completeOnboarding()">Passer</button>

  <!-- Step content -->
  <div class="step-content">
    <!-- Background gradient -->
    <div class="step-bg" [attr.data-step]="currentStep()"></div>

    <div class="step-inner">
      <!-- Logo on first step -->
      @if (currentStep() === 0) {
        <div class="welcome-logo">
          <div class="logo-circle">
            <span class="material-icons">bolt</span>
          </div>
        </div>
      }

      <h1 class="step-title">{{ step.title }}</h1>
      <p class="step-subtitle">{{ step.subtitle }}</p>

      <!-- Choices grid -->
      @if (step.choices) {
        <div class="choices-grid" [class.categories]="step.question === 'categories'" [class.locations]="step.question === 'location'">
          @for (choice of step.choices; track choice.value) {
            <button
              class="choice-card"
              [class.selected]="isSelected(choice.value)"
              (click)="selectChoice(choice.value)"
            >
              <span class="material-icons choice-icon">{{ choice.icon }}</span>
              <span class="choice-label">{{ choice.label }}</span>
              @if (choice.description) {
                <span class="choice-desc">{{ choice.description }}</span>
              }
            </button>
          }
        </div>
      }

      <!-- Navigation -->
      <div class="step-nav">
        @if (currentStep() > 0) {
          <button class="q-btn q-btn-secondary" (click)="prevStep()">
            <span class="material-icons">arrow_back</span> Retour
          </button>
        }

        @if (currentStep() === 0) {
          <button class="q-btn q-btn-primary q-btn-lg" (click)="nextStep()">
            Commencer <span class="material-icons">arrow_forward</span>
          </button>
        }

        @if (step.question === 'categories' && selectedCategories().length > 0) {
          <button class="q-btn q-btn-primary q-btn-lg" (click)="nextStep()">
            Continuer ({{ selectedCategories().length }}) <span class="material-icons">arrow_forward</span>
          </button>
        }
      </div>
    </div>
  </div>
</div>
