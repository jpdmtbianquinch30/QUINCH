<div class="auth-page">
  <div class="auth-split">
    <!-- Left - Branding -->
    <div class="auth-brand">
      <div class="brand-content">
        <img src="logoquinch.png" alt="QUINCH" class="brand-logo" />
        <h1 class="brand-title">QUINCH</h1>
        <p class="brand-tagline">Rejoignez la communaute</p>
        <div class="brand-features">
          <div class="feature"><span class="material-icons">storefront</span><span>Achetez et vendez librement</span></div>
          <div class="feature"><span class="material-icons">shield</span><span>Score de confiance integre</span></div>
          <div class="feature"><span class="material-icons">payments</span><span>Orange Money, Wave, Free Money</span></div>
        </div>
      </div>
    </div>

    <!-- Right - Form -->
    <div class="auth-form-side">
      <div class="auth-form-container">
        <h2>Creer un compte</h2>
        <p class="auth-subtitle">Inscrivez-vous gratuitement sur QUINCH</p>

        @if (error()) {
          <div class="error-message">{{ error() }}</div>
        }

        <form (ngSubmit)="register()">
          <div class="form-group">
            <label>Nom complet</label>
            <input type="text" class="q-input" [(ngModel)]="fullName" name="fullName" placeholder="Abdoulaye Diallo" />
          </div>

          <div class="form-group">
            <label>Numero de telephone</label>
            <div class="input-with-prefix">
              <span class="prefix">+221</span>
              <input type="tel" class="q-input" [(ngModel)]="phoneNumber" name="phone" placeholder="77 123 45 67" maxlength="15" />
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>Mot de passe</label>
              <input type="password" class="q-input" [(ngModel)]="password" name="password" placeholder="Min. 6 caracteres" />
            </div>
            <div class="form-group">
              <label>Confirmer</label>
              <input type="password" class="q-input" [(ngModel)]="passwordConfirm" name="passwordConfirm" placeholder="Confirmer" />
            </div>
          </div>

          <button type="submit" class="q-btn q-btn-primary q-btn-full q-btn-lg" [disabled]="loading()">
            @if (loading()) {
              <span class="spinner"></span> Creation...
            } @else {
              Creer mon compte
            }
          </button>
        </form>

        <div class="auth-footer">
          <p>Deja un compte ?</p>
          <a routerLink="/auth/login" class="q-btn q-btn-secondary q-btn-full">Se connecter</a>
        </div>
      </div>
    </div>
  </div>
</div>
