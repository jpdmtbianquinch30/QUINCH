<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="120" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4f6ef7"/>
      <stop offset="50%" stop-color="#6b8aff"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="shineGrad" x1="0" y1="0" x2="120" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="rgba(255,255,255,0.25)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <filter id="innerShadow" x="-10%" y="-10%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur"/>
      <feOffset dx="0" dy="2" result="offset"/>
      <feComposite in="SourceGraphic" in2="offset" operator="over"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="120" height="120" rx="28" fill="url(#bgGrad)"/>
  <!-- Shine overlay -->
  <rect width="120" height="120" rx="28" fill="url(#shineGrad)"/>
  <!-- Inner subtle border -->
  <rect x="1.5" y="1.5" width="117" height="117" rx="26.5" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
  <!-- Play triangle (video commerce) -->
  <path d="M44 38 L44 82 L84 60 Z" fill="rgba(255,255,255,0.12)" stroke="none"/>
  <!-- Q letter -->
  <circle cx="58" cy="56" r="22" fill="none" stroke="white" stroke-width="6" stroke-linecap="round"/>
  <line x1="72" y1="68" x2="84" y2="82" stroke="white" stroke-width="6" stroke-linecap="round"/>
  <!-- Shopping bag accent -->
  <path d="M76 86 L80 92 L90 92 L86 86" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Dot accent -->
  <circle cx="90" cy="30" r="4" fill="rgba(255,255,255,0.3)"/>
</svg>
