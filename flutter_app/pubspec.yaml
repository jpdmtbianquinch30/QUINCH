name: quinch
description: QUINCH - Marketplace TikTok-style pour le Sénégal
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.2

  # HTTP & networking
  dio: ^5.7.0

  # Navigation
  go_router: ^14.8.1

  # Local storage
  shared_preferences: ^2.5.3

  # UI & icons
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.17

  # Media
  video_player: ^2.9.4
  image_picker: ^1.1.2
  file_picker: ^8.1.7
  audioplayers: ^6.1.0
  photo_view: ^0.15.0

  # Utilities
  intl: ^0.19.0
  url_launcher: ^6.3.1
  share_plus: ^10.1.4
  path_provider: ^2.1.5
  mime: ^2.0.0
  timeago: ^3.7.0
  infinite_scroll_pagination: ^4.1.0
  pull_to_refresh_flutter3: ^2.0.2

  # Formatters
  mask_text_input_formatter: ^2.9.0
  flutter_local_notifications: ^20.1.0
  permission_handler: ^12.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo_quinch.png"
  adaptive_icon_background: "#0A0E1A"
  adaptive_icon_foreground: "assets/images/logo_quinch.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/

  # fonts:
